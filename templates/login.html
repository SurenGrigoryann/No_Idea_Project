<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — FuelForge</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f14;
      --surface:   #161920;
      --border:    #272b36;
      --text:      #e8eaf0;
      --muted:     #6b7080;
      --accent:    #c9a96e;
      --accent-dim:#a07d48;
      --error:     #e07070;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      padding: 1.5rem;
      overflow-x: hidden;
    }

    #bg-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }
    .card { position: relative; z-index: 1; }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 40%, rgba(201,169,110,.07) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      box-shadow: 0 24px 60px rgba(0,0,0,.5);
      animation: rise .5s ease both;
    }

    @keyframes rise {
      from { opacity:0; transform: translateY(18px); }
      to   { opacity:1; transform: translateY(0); }
    }

    .brand {
      display: flex;
      align-items: center;
      gap: .6rem;
      margin-bottom: 2rem;
    }

    .brand-icon {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: grid; place-items: center;
      font-size: 1rem; font-weight: 700;
      color: #0d0f14;
    }

    .brand-name {
      font-family: 'DM Serif Display', serif;
      font-size: 1.2rem;
      letter-spacing: .02em;
      color: var(--text);
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.7rem;
      font-weight: 400;
      margin-bottom: .4rem;
    }

    .subtitle {
      color: var(--muted);
      font-size: .875rem;
      margin-bottom: 2rem;
    }

    .alert {
      background: rgba(224,112,112,.1);
      border: 1px solid rgba(224,112,112,.35);
      color: var(--error);
      border-radius: 8px;
      padding: .7rem 1rem;
      font-size: .85rem;
      margin-bottom: 1.4rem;
    }

    .field { margin-bottom: 1.2rem; }

    label {
      display: block;
      font-size: .78rem;
      font-weight: 500;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .45rem;
    }

    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: .75rem 1rem;
      color: var(--text);
      font-family: inherit;
      font-size: .95rem;
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }

    input::placeholder { color: var(--muted); }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(201,169,110,.12);
    }

    .btn {
      width: 100%;
      margin-top: .6rem;
      padding: .82rem;
      background: var(--accent);
      color: #0d0f14;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: .95rem;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: .02em;
      transition: background .2s, transform .1s;
    }

    .btn:hover  { background: #d6b87a; }
    .btn:active { transform: scale(.98); }

    .footer {
      text-align: center;
      margin-top: 1.6rem;
      font-size: .82rem;
      color: var(--muted);
    }

    .footer a {
      color: var(--accent);
      text-decoration: none;
    }

    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
  <div class="card">

    <div class="brand">
      <div class="brand-icon">F</div>
      <span class="brand-name">FuelForge</span>
    </div>

    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to your account to continue.</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}">
      <div class="field">
        <label for="email">Email</label>
        <input
          type="email" id="email" name="email"
          placeholder="you@example.com"
          autocomplete="email" required />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input
          type="password" id="password" name="password"
          placeholder="••••••••"
          autocomplete="current-password" required />
      </div>

      <button type="submit" class="btn">Sign In</button>
    </form>

    <p class="footer">
      Don't have an account? <a href="{{ url_for('register.register') }}">Create one</a>
    </p>

  </div>
<script>
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  function random(min, max) { return Math.random() * (max - min) + min; }
  function createParticle() {
    return { x: random(0,W), y: random(0,H), r: random(1,3.5), speedX: random(-0.3,0.3), speedY: random(-0.5,-0.1), alpha: random(0.1,0.5), color: Math.random()>.5?'0,201,122':'29,185,122' };
  }
  function initParticles() { particles=[]; const count=Math.floor((W*H)/10000); for(let i=0;i<count;i++) particles.push(createParticle()); }
  const orbs = [
    { x:0.15, y:0.2,  r:280, color:'0,201,122',  alpha:0.04, dx:0.0002,   dy:0.00015  },
    { x:0.8,  y:0.6,  r:220, color:'167,139,250', alpha:0.04, dx:-0.00015, dy:0.0002   },
    { x:0.5,  y:0.9,  r:180, color:'96,165,250',  alpha:0.03, dx:0.0001,   dy:-0.00012 },
  ];
  let t = 0;
  function drawOrbs() {
    orbs.forEach(o => {
      o.x += Math.sin(t * o.dx * 1000) * 0.0003;
      o.y += Math.cos(t * o.dy * 1000) * 0.0003;
      const grd = ctx.createRadialGradient(o.x*W, o.y*H, 0, o.x*W, o.y*H, o.r);
      grd.addColorStop(0, `rgba(${o.color},${o.alpha})`);
      grd.addColorStop(1, `rgba(${o.color},0)`);
      ctx.beginPath(); ctx.arc(o.x*W, o.y*H, o.r, 0, Math.PI*2);
      ctx.fillStyle = grd; ctx.fill();
    });
  }
  function animate(ts) {
    t = ts; ctx.clearRect(0, 0, W, H); drawOrbs();
    particles.forEach((p, i) => {
      p.x += p.speedX; p.y += p.speedY;
      if (p.y < -10) particles[i] = { ...createParticle(), y: H + 5 };
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(${p.color},${p.alpha})`; ctx.fill();
    });
    requestAnimationFrame(animate);
  }
  resize(); initParticles(); requestAnimationFrame(animate);
  window.addEventListener('resize', () => { resize(); initParticles(); });
</script>
</body>
</html>
