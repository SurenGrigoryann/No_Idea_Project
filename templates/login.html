<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f14;
      --surface:   #161920;
      --border:    #272b36;
      --text:      #e8eaf0;
      --muted:     #6b7080;
      --accent:    #c9a96e;
      --accent-dim:#a07d48;
      --error:     #e07070;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      padding: 1.5rem;
    }

    /* Subtle radial glow behind card */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 40%, rgba(201,169,110,.07) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      box-shadow: 0 24px 60px rgba(0,0,0,.5);
      animation: rise .5s ease both;
    }

    @keyframes rise {
      from { opacity:0; transform: translateY(18px); }
      to   { opacity:1; transform: translateY(0); }
    }

    .brand {
      display: flex;
      align-items: center;
      gap: .6rem;
      margin-bottom: 2rem;
    }

    .brand-icon {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: grid; place-items: center;
      font-size: 1rem; font-weight: 700;
      color: #0d0f14;
    }

    .brand-name {
      font-family: 'DM Serif Display', serif;
      font-size: 1.2rem;
      letter-spacing: .02em;
      color: var(--text);
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.7rem;
      font-weight: 400;
      margin-bottom: .4rem;
    }

    .subtitle {
      color: var(--muted);
      font-size: .875rem;
      margin-bottom: 2rem;
    }

    .alert {
      background: rgba(224,112,112,.1);
      border: 1px solid rgba(224,112,112,.35);
      color: var(--error);
      border-radius: 8px;
      padding: .7rem 1rem;
      font-size: .85rem;
      margin-bottom: 1.4rem;
    }

    .field { margin-bottom: 1.2rem; }

    label {
      display: block;
      font-size: .78rem;
      font-weight: 500;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .45rem;
    }

    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: .75rem 1rem;
      color: var(--text);
      font-family: inherit;
      font-size: .95rem;
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }

    input::placeholder { color: var(--muted); }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(201,169,110,.12);
    }

    .btn {
      width: 100%;
      margin-top: .6rem;
      padding: .82rem;
      background: var(--accent);
      color: #0d0f14;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: .95rem;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: .02em;
      transition: background .2s, transform .1s;
    }

    .btn:hover  { background: #d6b87a; }
    .btn:active { transform: scale(.98); }

    .footer {
      text-align: center;
      margin-top: 1.6rem;
      font-size: .82rem;
      color: var(--muted);
    }

    .footer a {
      color: var(--accent);
      text-decoration: none;
    }

    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">

    <div class="brand">
      <div class="brand-icon">A</div>
      <span class="brand-name">Acme</span>
    </div>

    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to your account to continue.</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}">
      <div class="field">
        <label for="email">Email</label>
        <input
          type="email" id="email" name="email"
          placeholder="you@example.com"
          autocomplete="email" required />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input
          type="password" id="password" name="password"
          placeholder="••••••••"
          autocomplete="current-password" required />
      </div>

      <button type="submit" class="btn">Sign In</button>
    </form>

    <p class="footer">
      Don't have an account? <a href="#">Request access</a>
    </p>

  </div>
</body>
</html>
